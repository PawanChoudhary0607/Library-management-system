# Library Management System configuration
# Any property left out falls back to a default in AppConfig.

# Number of days a book may be borrowed before it is due back
library.loan.period.days=14

# Fine charged per day overdue (currency units)
library.fine.per.day=5

# Directory (relative to the working directory the app is run from)
# where books.json, members.json, and transactions.json live
library.data.directory=src/main/resources/data
